# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the action will run. Triggers the workflow on push or pull request
# events but only for the master branch
on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-1:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-1
      run: echo build-1
  build-2:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-2
      run: echo build-2
    needs: [build-1]
  build-3:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-3
      run: echo build-3
    needs: [build-2]
  build-4:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-4
      run: echo build-4
    needs: [build-3]
  build-5:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-5
      run: echo build-5
    needs: [build-3]
  build-6:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-6
      run: echo build-6
    needs: [build-3]
    
  build-7:
    runs-on: ubuntu-latest
    steps:
    - name: echo build-7
      run: echo build-7
    needs: [build-4, build-5, build-6]
